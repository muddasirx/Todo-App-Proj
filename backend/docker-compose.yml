# For LOCAL TESTING ONLY. In AWS, the EC2 user-data script generates and runs
# its own docker-compose.yml pointing at the real RDS instance + Secrets
# Manager credentials — this file is not used there.
services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=todoadmin
      - DB_PASSWORD=localdevpassword
      - DB_NAME=tododb
      - PORT=3000
      - CORS_ORIGIN=*
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=tododb
      - MYSQL_USER=todoadmin
      - MYSQL_PASSWORD=localdevpassword
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
